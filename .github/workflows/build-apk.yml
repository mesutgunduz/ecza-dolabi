name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK on EAS
        shell: bash
        run: |
          eas build --platform android --profile preview --non-interactive --wait --json > eas-build.json

      - name: Download APK from EAS
        shell: bash
        run: |
          node -e "const fs=require('fs');const raw=fs.readFileSync('eas-build.json','utf8');const parsed=JSON.parse(raw);const build=Array.isArray(parsed)?parsed[0]:parsed;const url=build?.artifacts?.buildUrl || build?.artifacts?.applicationArchiveUrl; if(!url){console.error(raw);throw new Error('APK download URL not found in EAS build output');} fs.writeFileSync('apk-url.txt', url);"
          curl -L "$(cat apk-url.txt)" -o app-preview.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-preview.apk
          path: app-preview.apk
          retention-days: 30
